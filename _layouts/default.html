<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #c8c8c8;
      --text-muted: #666666;
      --text-bright: #e8e8e8;
      --accent: #888888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fixed Top Navbar ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2rem;
      height: 48px;
    }
    nav a {
      padding: 0 0.9rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.2s;
      line-height: 48px;
    }
    nav a:hover { color: var(--text-bright); }

    /* ── Hero ── */
    .hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
      padding-top: calc(48px + 6rem);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      line-height: 1.15;
      max-width: 800px;
    }
    .hero .byline {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Content ── */
    .content {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    section {
      padding-top: 5rem;
      scroll-margin-top: 64px;
    }

    h2 {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .section-rule {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 2rem;
      border: none;
    }

    h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-bright);
      margin: 2.5rem 0 0.8rem;
    }

    p { margin-bottom: 1.2rem; }
    a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--text-bright); }
    strong { color: var(--text-bright); font-weight: 500; }
    em { font-style: italic; color: var(--text-muted); }

    code {
      font-family: 'Space Mono', monospace;
      font-size: 0.88em;
      background: var(--surface);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-size: 0.88rem;
      line-height: 1.6;
    }
    pre code { background: none; border: none; padding: 0; }

    ul, ol { margin: 0 0 1.2rem 1.4rem; }
    li { margin-bottom: 0.4rem; }

    blockquote {
      border-left: 2px solid var(--border);
      padding-left: 1.2rem;
      color: var(--text-muted);
      margin: 1.5rem 0;
      font-style: italic;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.92rem;
    }
    thead { border-bottom: 2px solid var(--border); }
    th {
      text-align: left;
      padding: 0.7rem 1rem;
      font-weight: 700;
      color: var(--text-bright);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: var(--surface); }

    img {
      max-width: 100%;
      border-radius: 6px;
      margin: 1.5rem 0;
      border: 1px solid var(--border);
    }

    iframe {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin: 1.5rem 0;
      background: var(--surface);
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    @media (max-width: 640px) {
      nav { flex-wrap: wrap; height: auto; padding: 0.4rem 1rem; justify-content: center; }
      nav a { padding: 0.4rem 0.5rem; font-size: 0.65rem; line-height: 1.8; }
      .hero { min-height: 50vh; padding-top: calc(80px + 4rem); }
      .content { padding: 0 1.5rem 4rem; }
      section { padding-top: 3.5rem; scroll-margin-top: 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#introduction">Introduction</a>
    <a href="#data-cleaning">Cleaning & EDA</a>
    <a href="#missingness">Missingness</a>
    <a href="#hypothesis">Hypothesis</a>
    <a href="#framing">Prediction</a>
    <a href="#baseline">Baseline</a>
    <a href="#final">Final Model</a>
    <a href="#fairness">Fairness</a>
  </nav>

  <div class="hero">
    <h1>Predicting Power Outage Duration</h1>
    <p class="byline">Rob &nbsp;·&nbsp; DSC 80 &nbsp;·&nbsp; UCSD</p>
  </div>

  <main class="content">
    {{ content }}
  </main>

  <footer>
    DSC 80 · UCSD · 2026
  </footer>

</body>
</html>
